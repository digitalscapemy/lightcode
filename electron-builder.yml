# appId deliberately unchanged after the "Light Code" rename: NSIS decides
# "same app, replace it" by appId, so keeping it lets old installs update over.
appId: com.mikhail.lightclaude
productName: Light Code
publish:
  provider: github
  owner: digitalscapemy
  repo: lightcode
  releaseType: release
directories:
  buildResources: build
  output: dist
files:
  - out/**
  - package.json
asarUnpack:
  - '**/node_modules/node-pty/**'
win:
  icon: build/icon.png
  target: nsis
  # no spaces: GitHub rewrites them in asset names, breaking latest.yml lookups
  artifactName: LightCode-Setup-${version}.${ext}
nsis:
  oneClick: true
  shortcutName: Light Code
mac:
  icon: build/icon.png
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  artifactName: LightCode-${version}-${arch}.${ext}
  # unsigned build (no Apple Developer account): users right-click > Open,
  # or run `xattr -cr "/Applications/Light Code.app"` once
  identity: null
