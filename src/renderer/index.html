<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Light Code</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:"
    />
  </head>
  <body>
    <div id="app">
      <header id="tabbar">
        <div id="tabs"></div>
        <button id="add-tab" title="New terminal tab (Ctrl+Shift+T)">+</button>
        <div class="spacer"></div>
        <button id="version-btn" class="tabbar-btn version-btn" title="About Light Code"></button>
        <div class="tabbar-divider"></div>
        <button id="projects-btn" class="tabbar-btn" title="Project shortcuts">
          <svg width="11" height="11" viewBox="0 0 11 11"><path d="M6.5 0.5 L2 6.5 H5 L4.5 10.5 L9 4.5 H6 Z" fill="none" stroke="currentColor" stroke-width="1" stroke-linejoin="round" /></svg>
        </button>
        <button id="accounts-btn" class="tabbar-btn" title="Claude accounts">
          <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="4" r="2.2" fill="none" stroke="currentColor" stroke-width="1" /><path d="M1.8 10.5 c0.6 -2.4 2.4 -3.4 4.2 -3.4 s3.6 1 4.2 3.4" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" /></svg>
        </button>
        <div class="tabbar-divider"></div>
        <div id="win-controls">
          <button id="win-min" title="Minimize">
            <svg width="10" height="10" viewBox="0 0 10 10"><rect y="4.5" width="10" height="1" fill="currentColor" /></svg>
          </button>
          <button id="win-max" title="Maximize / Restore">
            <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" /></svg>
          </button>
          <button id="win-close" title="Close">
            <svg width="10" height="10" viewBox="0 0 10 10"><path d="M0 0 L10 10 M10 0 L0 10" stroke="currentColor" stroke-width="1.2" /></svg>
          </button>
        </div>
      </header>
      <main id="content"></main>
      <div id="empty-state" hidden>
        <div class="empty-card">
          <img class="empty-logo" src="./logo.png" alt="Light Code" />
          <h2>Light Code</h2>
          <p>Open a project folder to get started.</p>
          <button id="empty-open">Open Project…</button>
          <p class="hint">
            <span class="key">Ctrl+Shift+E</span> Split right &nbsp; <span class="key">Ctrl+Shift+D</span> Split down<br />
            <span class="key">Ctrl+Shift+T</span> New tab &nbsp; <span class="key">Ctrl+Shift+W</span> Close pane
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
