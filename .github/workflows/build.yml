# Builds the Windows installer.
# - Push a v* tag  -> builds AND publishes/updates the GitHub Release (auto-update feed).
# - Manual run     -> builds artifacts only (no release).
#
# Publishing uses `gh release` instead of electron-builder's publisher:
# electron-builder can't append to an already-published release (it silently
# creates an orphaned draft), while `gh release upload --clobber` is idempotent.
name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run dist -- --publish never
      - name: Publish release (create + upload Windows assets)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes || true
          gh release upload "$GITHUB_REF_NAME" dist/*.exe dist/*.exe.blockmap dist/latest.yml --clobber
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/latest.yml
