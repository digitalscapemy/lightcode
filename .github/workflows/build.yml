# Builds installers for Windows and macOS.
# - Push a v* tag  -> builds AND publishes a GitHub Release (auto-update feed).
# - Manual run     -> builds artifacts only (no release).
name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: |
              dist/*.exe
              dist/latest.yml
            name: windows-installer
          - os: macos-latest
            artifact: |
              dist/*.dmg
              dist/*-mac.zip
              dist/latest-mac.yml
            name: mac-installer
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run dist -- --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}
